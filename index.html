<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    <style>
        body { margin: 0; background: #0f0205; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        #night-sky { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        .gift-card { position: relative; z-index: 10; background: #1a0409; border: 1px solid #d90429; border-radius: 20px; padding: 20px; width: 85vw; max-width: 400px; text-align: center; transition: all 0.5s; }
        .gift-card.folded { transform: scale(0.8) translateY(-20px); opacity: 0.8; }
        .bouquet-img { width: 100%; height: auto; border-radius: 12px; display: block; margin-bottom: 15px; }
        button { background: #d90429; color: white; border: none; padding: 12px 20px; border-radius: 20px; cursor: pointer; margin: 5px; }
        .section { display: none; }
        #sky-note { display: none; font-style: italic; font-size: 0.9rem; margin-top: 15px; border-top: 1px solid #d90429; padding-top: 10px; }
    </style>
</head>
<body>
    <div id="night-sky"></div>
    <div class="gift-card" id="card">
        <img src="https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?auto=format&fit=crop&q=80&w=400" class="bouquet-img">
        <div id="intro" class="section" style="display:block;">
            <button onclick="openNote()">Tap to Open</button>
        </div>
        <div id="content" class="section">
            <p>Since we can't meet, I wanted to share this with you.</p>
            <button onclick="toggleSky()">✨ Sky</button>
        </div>
        <div id="sky-note">Since we couldn't go stargazing yet, I brought the sky to you. ✨<br><br><button onclick="reset()">Back</button></div>
    </div>
    <script>
        function openNote() { 
            document.getElementById('intro').style.display='none'; 
            document.getElementById('content').style.display='block'; 
        }
        function toggleSky() { 
            document.getElementById('card').classList.add('folded'); 
            document.getElementById('content').style.display='none'; 
            document.getElementById('sky-note').style.display='block'; 
        }
        function reset() { 
            document.getElementById('card').classList.remove('folded'); 
            document.getElementById('content').style.display='block'; 
            document.getElementById('sky-note').style.display='none'; 
        }
    </script>
</body>
</html>
