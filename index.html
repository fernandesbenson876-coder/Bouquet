<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0a0103; 
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* The Presentation Card */
        .gift-card {
            background: linear-gradient(145deg, #1a0409, #0d0204);
            border: 1px solid rgba(217, 4, 41, 0.2);
            border-radius: 24px;
            padding: 35px 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(217, 4, 41, 0.1);
            text-align: center;
        }

        /* The Real Bouquet Image */
        .bouquet-img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            object-fit: cover; 
            /* This ensures it looks like a full arrangement */
            max-height: 380px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Typography */
        h1 {
            color: #ef233c;
            font-size: 2.4rem;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .verse {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #edf2f4;
            margin: 25px 0;
            font-style: italic;
            opacity: 0.9;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #d90429;
            margin-top: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Interactive Button */
        .btn {
            background: #d90429;
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(217, 4, 41, 0.3);
            margin-top: 15px;
        }

        .btn:hover {
            background: #ef233c;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(217, 4, 41, 0.5);
        }

        /* Layout switching */
        #note-content { display: none; animation: fadeIn 1s ease forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="gift-card">
        <img src="https://images.unsplash.com/photo-1587314168485-3236d6710814?auto=format&fit=crop&q=80&w=800" alt="Wrapped Bouquet of Red Roses" class="bouquet-img">
        
        <div id="intro-section">
            <h1>For You</h1>
            <button class="btn" onclick="openNote()">Tap to Open</button>
        </div>

        <div id="note-content">
            <div class="verse">
                A moment in time, a spark in the dark,<br>
                A few simple words that have left a deep mark.<br>
                I can't hand you these, though I wish that I could,<br>
                But I hope that this gesture is still understood.
            </div>
            <div class="signature">~ Benson Fernandes</div>
        </div>
    </div>

    <script>
        function openNote() {
            document.getElementById('intro-section').style.display = 'none';
            document.getElementById('note-content').style.display = 'block';
        }
    </script>
</body>
</html>
