<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Bouquet For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #e11d48;
            --rose-dark: #881337;
            --stem: #166534;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #1e0303 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            color: #fff;
            overflow: hidden;
            cursor: pointer;
        }

        /* The Bouquet Container */
        .bouquet {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
            transition: transform 0.5s ease;
        }

        .flower {
            position: relative;
            margin: 0 10px;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flower:hover { transform: translateY(-30px); }

        /* Realistic Rose Design */
        .bloom {
            width: 70px; height: 70px;
            background: var(--rose);
            border-radius: 50% 50% 50% 50%;
            position: relative;
            box-shadow: 0 0 30px rgba(225, 29, 72, 0.6);
        }
        .bloom::before, .bloom::after {
            content: '';
            position: absolute;
            width: 70px; height: 70px;
            background: var(--rose-dark);
            border-radius: 50%;
            top: 10px;
        }
        .bloom::before { left: -20px; }
        .bloom::after { left: 20px; }

        .stem {
            width: 4px; height: 140px;
            background: var(--stem);
            margin: 0 auto;
            position: relative;
            z-index: -1;
        }

        /* Bouquet Wrapper */
        .wrap {
            position: absolute;
            bottom: 0;
            width: 220px; height: 260px;
            background: linear-gradient(to bottom, #4c0519, #23010c);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            z-index: 1;
            opacity: 0.9;
        }

        /* The Note */
        #note {
            margin-top: 60px;
            text-align: center;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .show-note { opacity: 1 !important; }

        /* Falling Petals */
        .petal {
            position: absolute;
            background: var(--rose);
            width: 12px; height: 12px;
            border-radius: 0 50% 50% 50%;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body onclick="startExperience()">

    <div class="bouquet">
        <div class="flower"><div class="bloom"></div><div class="stem"></div></div>
        <div class="flower"><div class="bloom"></div><div class="stem"></div></div>
        <div class="flower"><div class="bloom"></div><div class="stem"></div></div>
        <div class="wrap"></div>
    </div>

    <div id="note">Since I can't be there to give you these in person,<br>I wanted to send you my heart instead. ❤️</div>

    <script>
        function startExperience() {
            // Reveal note
            document.getElementById('note').classList.add('show-note');
            
            // Create petals continuously
            for(let i = 0; i < 25; i++) {
                setTimeout(createPetal, i * 300);
            }
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 4 + 3) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 7000);
        }
    </script>
</body>
</html>
