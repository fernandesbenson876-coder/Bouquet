<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0f0508 0%, #2a0a14 50%, #0f0508 100%);
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }
        #canvas { display: block; width: 100%; height: 100%; }
        
        .header {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdddd;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 6px 40px rgba(180, 30, 30, 0.9);
            z-index: 100;
            pointer-events: none;
        }
        
        .btn {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 58px;
            background: rgba(180, 20, 40, 0.2);
            border: 2px solid #ff7777;
            color: #ffdddd;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            transition: all 0.4s;
            font-weight: 500;
            z-index: 100;
        }
        .btn:hover {
            background: rgba(200, 30, 50, 0.4);
            box-shadow: 0 0 35px rgba(255, 90, 90, 0.8);
            transform: translateX(-50%) scale(1.06);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(10, 5, 8, 0.95);
            backdrop-filter: blur(18px);
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex !important; }
        
        .msg-box {
            background: linear-gradient(145deg, #3a0f1f, #1a0812);
            padding: 75px 85px;
            border: 3px solid #cc4455;
            border-radius: 38px;
            max-width: 780px;
            text-align: center;
            box-shadow: 0 35px 130px rgba(200, 40, 60, 0.65);
        }
        .msg-box h2 { color: #ffbbbb; font-size: 44px; margin-bottom: 45px; letter-spacing: 2px; }
        .msg-box p { color: #ffeeee; font-size: 23px; line-height: 1.75; margin-bottom: 30px; }
        .msg-box .sig { color: #ff8888; font-size: 23px; margin-top: 55px; font-style: italic; }
        
        .close-btn {
            margin-top: 45px;
            padding: 15px 52px;
            background: rgba(180, 20, 40, 0.25);
            border: 2px solid #ff7777;
            color: #ffdddd;
            font-size: 17px;
            border-radius: 50px;
            cursor: pointer;
        }
        .close-btn:hover { background: #cc3344; transform: scale(1.05); }
        
        .hint {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 200, 0.55);
            font-size: 14px;
            z-index: 100;
            animation: pulse 2.8s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.85; } }
    </style>
</head>
<body>
    <div class="header">✦ For You 🌹 ✦</div>
    <button class="btn" id="msgBtn">💌 Read My Message</button>

    <div id="modal" class="modal">
        <div class="msg-box">
            <h2>A Special Gift</h2>
            <p>Since we can't meet today, I'd like to give you this gift.</p>
            <p>Because a girl like you deserves truly a lot!</p>
            <p>This note is for you miss</p>
            <div class="sig">~ Benson Fernandes</div>
            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

    <div class="hint">Move mouse to admire • Click message</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        camera.position.set(0.2, 2.8, 7.8);
        camera.lookAt(0, 1.4, 0);

        scene.add(new THREE.AmbientLight(0xffeedd, 0.75));

        const keyLight = new THREE.PointLight(0xff7744, 4.8, 120);
        keyLight.position.set(6, 9, 11);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        scene.add(keyLight);

        scene.add(new THREE.PointLight(0xffaacc, 2.4, 90)).position.set(-5.5, 4.5, 7);
        scene.add(new THREE.PointLight(0xcc3366, 2.1, 70)).position.set(1, 6, -9);

        function createRealisticRose(baseColor) {
            const rose = new THREE.Group();
            
            function createPetal(color) {
                const curvePoints = [];
                for (let i = 0; i <= 36; i++) {
                    const t = i / 36;
                    const wave = Math.sin(t * Math.PI * 4) * 0.06;
                    const x = Math.sin(t * Math.PI) * (0.68 + wave);
                    const y = t * 1.28;
                    const z = Math.sin(t * Math.PI * 2.2) * 0.11;
                    curvePoints.push(new THREE.Vector3(x, y, z));
                }
                
                const curve = new THREE.CatmullRomCurve3(curvePoints);
                const shapePoints = curve.getPoints(42);
                
                const shape = new THREE.Shape();
                shape.moveTo(shapePoints[0].x, shapePoints[0].y);
                shapePoints.forEach(p => shape.lineTo(p.x, p.y));
                for (let i = shapePoints.length - 1; i >= 0; i--) {
                    shape.lineTo(-shapePoints[i].x * 0.95, shapePoints[i].y);
                }
                shape.closePath();

                const geometry = new THREE.ShapeGeometry(shape);
                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.72,
                    metalness: 0.08,
                    side: THREE.DoubleSide,
                });

                const petal = new THREE.Mesh(geometry, material);
                petal.castShadow = true;
                petal.receiveShadow = true;
                return petal;
            }

            const layers = [
                {count: 40, r: 0.82, h: 0.42, rot: -0.45},
                {count: 34, r: 0.61, h: 0.29, rot: -0.58},
                {count: 26, r: 0.41, h: 0.17, rot: -0.75},
                {count: 16, r: 0.22, h: 0.08, rot: -0.95}
            ];

            layers.forEach((l, idx) => {
                for (let i = 0; i < l.count; i++) {
                    const angle = (i / l.count) * Math.PI * 2 + (Math.random()-0.5)*0.45;
                    const petal = createPetal(baseColor);
                    
                    petal.position.set(
                        Math.cos(angle) * l.r * (0.85 + Math.random()*0.3),
                        l.h + Math.random()*0.2,
                        Math.sin(angle) * l.r * 0.9
                    );
                    
                    petal.rotation.set(0.3 + Math.random()*0.4, angle, l.rot + (Math.random()-0.5)*0.6);
                    rose.add(petal);
                }
            });

            // Center
            const center = new THREE.Mesh(
                new THREE.SphereGeometry(0.21, 48, 48),
                new THREE.MeshStandardMaterial({color: 0xffdd88, emissive: 0xff5500, emissiveIntensity: 0.8})
            );
            center.position.y = 0.82;
            rose.add(center);

            return rose;
        }

        const bouquet = new THREE.Group();
        const colors = [0x9c1c2e, 0xb81e36, 0xd42a45, 0xe83b4f];

        for (let i = 0; i < 9; i++) {
            const rose = createRealisticRose(colors[i % colors.length]);
            rose.position.set((Math.random()-0.5)*1.2, Math.random()*0.6, (Math.random()-0.5)*1.0);
            rose.rotation.set((Math.random()-0.5)*0.4, Math.random()*Math.PI*2, (Math.random()-0.5)*0.5);
            bouquet.add(rose);
        }

        // Stems, wrapper, ribbon (same as before)
        const stemGroup = new THREE.Group();
        for (let i = 0; i < 9; i++) {
            const a = (i/9)*Math.PI*2*0.9;
            const curve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(Math.cos(a)*0.25, 0.5, Math.sin(a)*0.2),
                new THREE.Vector3(Math.cos(a)*0.1, -0.5, Math.sin(a)*0.15),
                new THREE.Vector3(Math.cos(a)*0.3, -2.4, Math.sin(a)*0.32)
            );
            const stem = new THREE.Mesh(new THREE.TubeGeometry(curve, 20, 0.055, 8), 
                new THREE.MeshStandardMaterial({color: 0x1f3a22, roughness: 0.95}));
            stem.castShadow = true;
            stemGroup.add(stem);
        }
        bouquet.add(stemGroup);

        const wrapper = new THREE.Mesh(new THREE.ConeGeometry(1.5, 2.9, 48), 
            new THREE.MeshStandardMaterial({color: 0xf8e8e0, roughness: 0.8}));
        wrapper.rotation.x = Math.PI;
        wrapper.position.y = -1.3;
        bouquet.add(wrapper);

        const ribbon = new THREE.Mesh(new THREE.TorusGeometry(1.28, 0.12, 24, 120), 
            new THREE.MeshStandardMaterial({color: 0xbb1122, roughness: 0.4}));
        ribbon.rotation.x = Math.PI / 2.15;
        ribbon.position.y = -0.75;
        bouquet.add(ribbon);

        bouquet.position.y = 1.1;
        scene.add(bouquet);

        // Falling petals + interaction (kept similar but smoother)
        const petals = [];
        let pGeo = new THREE.BufferGeometry();
        const pMat = new THREE.PointsMaterial({size: 0.17, color: 0xff7777, transparent: true, opacity: 0.82});
        const pSystem = new THREE.Points(pGeo, pMat);
        scene.add(pSystem);

        class Petal { 
            constructor() {
                this.pos = new THREE.Vector3((Math.random()-0.5)*16, 7+Math.random()*6, (Math.random()-0.5)*14);
                this.vel = new THREE.Vector3((Math.random()-0.5)*0.7, -0.3-Math.random()*0.4, (Math.random()-0.5)*0.6);
                this.life = 1;
            }
            update(dt, wind) {
                this.vel.y -= 0.004;
                this.vel.x += wind*0.02;
                this.pos.addScaledVector(this.vel, dt*23);
                this.life -= dt*0.2;
            }
        }

        let mouseX = 0;
        document.addEventListener('mousemove', e => mouseX = (e.clientX / window.innerWidth - 0.5) * 2.5);

        const modal = document.getElementById('modal');
        const msgBtn = document.getElementById('msgBtn');
        const closeBtn = document.getElementById('closeBtn');
        let modalOpen = false;

        msgBtn.addEventListener('click', () => { modalOpen = true; modal.classList.add('show'); });
        closeBtn.addEventListener('click', () => { modalOpen = false; modal.classList.remove('show'); });
        modal.addEventListener('click', e => { if (e.target === modal) { modalOpen = false; modal.classList.remove('show'); }});

        const clock = new THREE.Clock();
        let t = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            t += dt;

            if (!modalOpen) bouquet.rotation.y = Math.sin(t*0.3)*0.1 + mouseX*0.5;
            bouquet.position.y = 1.1 + Math.sin(t*0.7)*0.09;

            if (Math.random() < 0.65 && petals.length < 280) petals.push(new Petal());

            for (let i = petals.length-1; i >= 0; i--) {
                petals[i].update(dt, mouseX*0.7);
                if (petals[i].life <= 0 || petals[i].pos.y < -5) petals.splice(i,1);
            }

            const pos = new Float32Array(petals.length * 3);
            petals.forEach((p,i) => { pos[i*3]=p.pos.x; pos[i*3+1]=p.pos.y; pos[i*3+2]=p.pos.z; });
            pGeo.dispose();
            pGeo = new THREE.BufferGeometry();
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            pSystem.geometry = pGeo;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
