<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Digital Bouquet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0d1126 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .info {
            position: absolute;
            top: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: rgba(255, 200, 220, 0.8);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .interaction {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
        }

        .cursor-custom {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 200, 220, 0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
        }

        .cursor-custom::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 200, 220, 0.8);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>Digital Bouquet</h1>
        <p>Hover and click to interact</p>
    </div>
    <div class="interaction">
        <p>✦ Drag to move • Click to bloom • Move for wind effect</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ============================================
        // SCENE SETUP
        // ============================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        camera.position.set(0, 1.5, 6);
        camera.lookAt(0, 1, 0);

        // ============================================
        // LIGHTING
        // ============================================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.PointLight(0xffb3d9, 1.5, 100);
        mainLight.position.set(3, 4, 5);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x8099ff, 0.8, 100);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xff69b4, 0.6, 80);
        rimLight.position.set(0, 3, -5);
        scene.add(rimLight);

        // ============================================
        // PETAL GEOMETRY (REALISTIC)
        // ============================================
        function createPetalGeometry() {
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0.15, 0.3, 0.1),
                new THREE.Vector3(0.2, 0.6, 0.15),
                new THREE.Vector3(0.15, 0.9, 0.1),
                new THREE.Vector3(0, 1, 0)
            ]);

            const points = curve.getPoints(8);
            const shape = new THREE.Shape();
            shape.moveTo(points[0].x, points[0].y);
            points.forEach((p, i) => {
                if (i > 0) shape.lineTo(p.x, p.y);
            });
            shape.lineTo(-points[points.length - 1].x, points[points.length - 1].y);
            points.reverse();
            points.forEach((p, i) => {
                if (i > 0) shape.lineTo(-p.x, p.y);
            });
            shape.closePath();

            const geometry = new THREE.ShapeGeometry(shape);
            geometry.rotateY(Math.random() * Math.PI * 2);
            geometry.translate(0, 0, Math.random() * 0.2 - 0.1);
            return geometry;
        }

        // ============================================
        // FLOWER CREATION
        // ============================================
        class Flower {
            constructor(position, color) {
                this.group = new THREE.Group();
                this.position = position;
                this.color = color;
                this.petals = [];
                this.originalPositions = [];
                this.targetPositions = [];
                this.bloomFactor = 0;

                this.createFlower();
                this.group.position.copy(position);
            }

            createFlower() {
                const petalCount = 6;
                const petalMaterial = new THREE.MeshStandardMaterial({
                    color: this.color,
                    roughness: 0.4,
                    metalness: 0.1,
                    emissive: this.color,
                    emissiveIntensity: 0.3,
                    side: THREE.DoubleSide,
                });

                for (let i = 0; i < petalCount; i++) {
                    const angle = (i / petalCount) * Math.PI * 2;
                    const petalGeometry = createPetalGeometry();
                    const petal = new THREE.Mesh(petalGeometry, petalMaterial.clone());
                    
                    petal.rotation.z = angle;
                    petal.position.set(
                        Math.cos(angle) * 0.3,
                        0,
                        Math.sin(angle) * 0.3
                    );

                    this.originalPositions.push({
                        x: petal.position.x,
                        y: petal.position.y,
                        z: petal.position.z
                    });
                    this.targetPositions.push({
                        x: Math.cos(angle) * 0.5,
                        y: 0.1,
                        z: Math.sin(angle) * 0.5
                    });

                    petal.castShadow = true;
                    petal.receiveShadow = true;
                    this.petals.push(petal);
                    this.group.add(petal);
                }

                // Flower center
                const centerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
                const centerMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffd700,
                    roughness: 0.3,
                    metalness: 0.2,
                    emissive: 0xffaa00,
                    emissiveIntensity: 0.5,
                });
                const center = new THREE.Mesh(centerGeometry, centerMaterial);
                center.castShadow = true;
                center.receiveShadow = true;
                this.group.add(center);
            }

            bloom() {
                gsap.to(this, {
                    bloomFactor: 1,
                    duration: 1.5,
                    ease: 'elastic.out(1, 0.5)',
                    onUpdate: () => {
                        this.petals.forEach((petal, i) => {
                            const orig = this.originalPositions[i];
                            const target = this.targetPositions[i];
                            petal.position.x = orig.x + (target.x - orig.x) * this.bloomFactor;
                            petal.position.y = orig.y + (target.y - orig.y) * this.bloomFactor;
                            petal.position.z = orig.z + (target.z - orig.z) * this.bloomFactor;
                        });
                    }
                });
            }

            resetBloom() {
                gsap.to(this, {
                    bloomFactor: 0,
                    duration: 1.2,
                    ease: 'power2.inOut',
                    onUpdate: () => {
                        this.petals.forEach((petal, i) => {
                            const orig = this.originalPositions[i];
                            const target = this.targetPositions[i];
                            petal.position.x = orig.x + (target.x - orig.x) * this.bloomFactor;
                            petal.position.y = orig.y + (target.y - orig.y) * this.bloomFactor;
                            petal.position.z = orig.z + (target.z - orig.z) * this.bloomFactor;
                        });
                    }
                });
            }
        }

        // ============================================
        // CREATE BOUQUET
        // ============================================
        const flowers = [];
        const flowerColors = [0xff69b4, 0xff85c0, 0xffb3d9, 0xc084d8, 0xda70d6];

        function createBouquet() {
            const positions = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(-0.6, 0.4, -0.5),
                new THREE.Vector3(0.6, 0.3, -0.4),
                new THREE.Vector3(-0.3, -0.2, 0.4),
                new THREE.Vector3(0.4, -0.1, 0.5),
            ];

            positions.forEach((pos, i) => {
                const flower = new Flower(
                    pos,
                    flowerColors[i % flowerColors.length]
                );
                scene.add(flower.group);
                flowers.push(flower);
            });
        }

        createBouquet();

        // ============================================
        // PARTICLE SYSTEM (Falling Petals)
        // ============================================
        class PetalParticle {
            constructor() {
                this.position = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    5,
                    (Math.random() - 0.5) * 8
                );
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 1,
                    -Math.random() * 0.5 - 0.2,
                    (Math.random() - 0.5) * 1
                );
                this.rotation = new THREE.Euler(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );
                this.rotationVelocity = new THREE.Euler(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                );
                this.scale = Math.random() * 0.5 + 0.5;
                this.life = 1;
                this.maxLife = Math.random() * 8 + 5;
            }

            update(deltaTime, wind) {
                this.velocity.y -= 0.005;
                this.velocity.x += wind.x * 0.02;
                this.velocity.z += wind.z * 0.02;

                this.position.add(this.velocity);
                this.rotation.x += this.rotationVelocity.x;
                this.rotation.y += this.rotationVelocity.y;
                this.rotation.z += this.rotationVelocity.z;

                this.life -= deltaTime / this.maxLife;
                if (this.life < 0) this.life = 0;

                if (this.position.y < -2) this.life = 0;
            }

            isAlive() {
                return this.life > 0;
            }
        }

        let particles = [];
        const maxParticles = 150;
        let particleEmissionCounter = 0;

        function updateParticles(deltaTime, wind) {
            particleEmissionCounter += deltaTime;
            if (particleEmissionCounter > 0.05 && particles.length < maxParticles) {
                particles.push(new PetalParticle());
                particleEmissionCounter = 0;
            }

            particles = particles.filter(p => {
                p.update(deltaTime, wind);
                return p.isAlive();
            });
        }

        // ============================================
        // PARTICLE RENDERING (using THREE Points)
        // ============================================
        let particleGeometry = new THREE.BufferGeometry();
        let particlePositions = [];
        let particleScales = [];
        let particleAlphas = [];

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            sizeAttenuation: true,
            transparent: true,
            depthWrite: false,
            color: 0xffb3d9,
            opacity: 0.6,
        });

        let particlePoints = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particlePoints);

        function updateParticleGeometry() {
            particlePositions = [];
            particleScales = [];
            particleAlphas = [];

            particles.forEach(p => {
                particlePositions.push(p.position.x, p.position.y, p.position.z);
                particleScales.push(p.scale * (0.5 + p.life * 0.5));
                particleAlphas.push(p.life * 0.8);
            });

            particleGeometry.dispose();
            particleGeometry = new THREE.BufferGeometry();

            if (particlePositions.length > 0) {
                particleGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePositions), 3));
            }

            particlePoints.geometry = particleGeometry;
        }

        // ============================================
        // INTERACTION
        // ============================================
        const mouse = new THREE.Vector2();
        const windVector = new THREE.Vector2(0, 0);
        let selectedFlower = null;
        let isDragging = false;
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        let dragPoint = new THREE.Vector3();

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            windVector.x = mouse.x * 2;
            windVector.y = mouse.y * 2;
        });

        window.addEventListener('mousedown', (e) => {
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const flowerMeshes = flowers.flatMap(f => f.petals);
            const intersects = raycaster.intersectObjects(flowerMeshes);

            if (intersects.length > 0) {
                selectedFlower = flowers.find(f => f.petals.includes(intersects[0].object));
                if (selectedFlower) {
                    selectedFlower.bloom();
                    isDragging = true;
                }
            }
        });

        window.addEventListener('mouseup', () => {
            if (selectedFlower) {
                selectedFlower.resetBloom();
                selectedFlower = null;
            }
            isDragging = false;
        });

        // ============================================
        // ANIMATION LOOP
        // ============================================
        const clock = new THREE.Clock();
        let lastTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            lastTime += deltaTime;

            // Update particles
            updateParticles(deltaTime, windVector);
            updateParticleGeometry();

            // Gentle floating animation for bouquet
            flowers.forEach((flower, i) => {
                flower.group.position.y += Math.sin(lastTime * 0.5 + i) * 0.0005;
                flower.group.rotation.y += 0.001;
                
                // Respond to wind
                flower.group.position.x += windVector.x * 0.001;
                flower.group.position.z += windVector.y * 0.001;
            });

            // Animate lights
            mainLight.position.x = Math.sin(lastTime * 0.3) * 4 + 3;
            mainLight.position.z = Math.cos(lastTime * 0.4) * 4 + 5;

            renderer.render(scene, camera);
        }

        animate();

        // ============================================
        // HANDLE WINDOW RESIZE
        // ============================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
