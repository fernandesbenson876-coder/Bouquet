<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Rose Bouquet 🌹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a0008 0%, #2a0014 50%, #1a0008 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #canvas { display: block; width: 100%; height: 100%; }
        
        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff9999;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 6px;
            text-shadow: 0 4px 40px rgba(255, 50, 50, 0.8);
            z-index: 100;
            pointer-events: none;
        }
        
        .btn {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 60px;
            background: rgba(220, 20, 60, 0.15);
            border: 2px solid #ff6666;
            color: #ffcccc;
            font-size: 19px;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600;
            z-index: 100;
            text-shadow: 0 2px 15px rgba(0,0,0,0.7);
        }
        .btn:hover {
            background: rgba(220, 20, 60, 0.35);
            box-shadow: 0 0 40px rgba(255, 80, 80, 0.9);
            transform: translateX(-50%) scale(1.08);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex !important; }
        
        .msg-box {
            background: linear-gradient(135deg, #3a0014, #1a0008);
            padding: 70px 80px;
            border: 3px solid #ff5555;
            border-radius: 40px;
            max-width: 820px;
            text-align: center;
            box-shadow: 0 40px 140px rgba(255, 60, 60, 0.7);
        }
        .msg-box h2 {
            color: #ffaaaa;
            font-size: 46px;
            margin-bottom: 50px;
            letter-spacing: 4px;
        }
        .msg-box p {
            color: #ffe0e0;
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 35px;
        }
        .msg-box .sig {
            color: #ff7777;
            font-size: 24px;
            margin-top: 60px;
            font-style: italic;
        }
        
        .close-btn {
            margin-top: 50px;
            padding: 14px 50px;
            background: rgba(220, 20, 60, 0.2);
            border: 2px solid #ff6666;
            color: #ffcccc;
            font-size: 17px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .close-btn:hover {
            background: #ff3333;
            color: white;
            transform: scale(1.05);
        }
        
        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 180, 180, 0.6);
            font-size: 14px;
            z-index: 100;
            animation: pulse 3s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.9; } }
    </style>
</head>
<body>
    <div class="header">✦ Eternal Roses ✦</div>
    <button class="btn" id="msgBtn">💌 Open Love Note</button>

    <div id="modal" class="modal">
        <div class="msg-box">
            <h2>My Dearest</h2>
            <p>These roses are just a small token of how much you mean to me.</p>
            <p>May their beauty remind you of my love every single day.</p>
            <div class="sig">— With all my heart</div>
            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

    <div class="hint">Move mouse to gently rotate • Click for message</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        camera.position.set(0, 3, 8);
        camera.lookAt(0, 1.5, 0);

        // Lights - Warm romantic atmosphere
        const ambient = new THREE.AmbientLight(0xffeecc, 0.7);
        scene.add(ambient);

        const keyLight = new THREE.PointLight(0xff5555, 4.5, 100);
        keyLight.position.set(5, 8, 10);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        scene.add(keyLight);

        const fillLight = new THREE.PointLight(0xffbbaa, 2.2, 80);
        fillLight.position.set(-6, 5, 6);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xff3366, 2.8, 60);
        rimLight.position.set(0, 7, -8);
        scene.add(rimLight);

        // Enhanced Rose Creator
        function createAttractiveRose(baseColor, glowColor) {
            const rose = new THREE.Group();
            
            function createPetal(color, scale = 1, curveBend = 1) {
                const points = [];
                for (let i = 0; i <= 18; i++) {
                    const t = i / 18;
                    const x = Math.sin(t * Math.PI) * 0.85 * (1 - t * 0.3);
                    const y = t * 1.1;
                    const z = Math.sin(t * Math.PI * 2) * 0.08 * curveBend;
                    points.push(new THREE.Vector3(x, y, z));
                }
                
                const curve = new THREE.CatmullRomCurve3(points);
                const shapePoints = curve.getPoints(24);
                
                const shape = new THREE.Shape();
                shape.moveTo(shapePoints[0].x, shapePoints[0].y);
                shapePoints.forEach(p => shape.lineTo(p.x, p.y));
                for (let i = shapePoints.length - 1; i >= 0; i--) {
                    shape.lineTo(-shapePoints[i].x, shapePoints[i].y);
                }
                shape.closePath();

                const geometry = new THREE.ShapeGeometry(shape);
                const material = new THREE.MeshPhongMaterial({
                    color: color,
                    shininess: 8,
                    specular: 0xffffff,
                    emissive: glowColor,
                    emissiveIntensity: 0.45,
                    side: THREE.DoubleSide,
                    flatShading: false
                });

                const petalMesh = new THREE.Mesh(geometry, material);
                petalMesh.castShadow = true;
                petalMesh.receiveShadow = true;
                return petalMesh;
            }

            // Multiple realistic layers
            const layers = [
                { count: 36, radius: 0.72, height: 0.42, rotZ: -0.35, scale: 1.12, color: baseColor },
                { count: 28, radius: 0.52, height: 0.28, rotZ: -0.5, scale: 0.98, color: baseColor },
                { count: 20, radius: 0.32, height: 0.16, rotZ: -0.65, scale: 0.82, color: baseColor },
                { count: 12, radius: 0.18, height: 0.08, rotZ: -0.8, scale: 0.65, color: 0xff3344 }
            ];

            layers.forEach(layer => {
                for (let i = 0; i < layer.count; i++) {
                    const petal = createPetal(layer.color, layer.scale, 1.1);
                    const angle = (i / layer.count) * Math.PI * 2 + (Math.random() - 0.5) * 0.25;
                    
                    petal.position.set(
                        Math.cos(angle) * layer.radius,
                        layer.height + Math.random() * 0.12,
                        Math.sin(angle) * layer.radius * 0.9
                    );
                    
                    petal.rotation.set(
                        0.15 + Math.random() * 0.25,
                        angle,
                        layer.rotZ + (Math.random() - 0.5) * 0.4
                    );
                    
                    rose.add(petal);
                }
            });

            // Center
            const center = new THREE.Mesh(
                new THREE.SphereGeometry(0.22, 48, 48),
                new THREE.MeshPhongMaterial({
                    color: 0xffee88,
                    emissive: 0xff6600,
                    emissiveIntensity: 0.9,
                    shininess: 30
                })
            );
            center.position.y = 0.72;
            rose.add(center);

            return rose;
        }

        // Bouquet
        const bouquet = new THREE.Group();

        const roseColors = [
            { color: 0xc8102e, glow: 0xff4444 },
            { color: 0x9c132f, glow: 0xff5555 },
            { color: 0xe31b4b, glow: 0xff3366 },
            { color: 0xb71c2c, glow: 0xff6666 }
        ];

        for (let i = 0; i < 9; i++) {
            const cfg = roseColors[i % roseColors.length];
            const rose = createAttractiveRose(cfg.color, cfg.glow);
            
            const spread = 0.9;
            rose.position.set(
                (Math.random() - 0.5) * spread,
                Math.random() * 0.45,
                (Math.random() - 0.5) * spread
            );
            
            rose.rotation.set(
                (Math.random() - 0.5) * 0.4,
                Math.random() * Math.PI * 2,
                (Math.random() - 0.5) * 0.5
            );
            
            bouquet.add(rose);
        }

        // Stems + Leaves
        const stemGroup = new THREE.Group();
        for (let i = 0; i < 9; i++) {
            const angle = (i / 9) * Math.PI * 2;
            const curve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(Math.cos(angle) * 0.2, 0.4, Math.sin(angle) * 0.2),
                new THREE.Vector3(Math.cos(angle) * 0.1, -0.6, Math.sin(angle) * 0.15),
                new THREE.Vector3(Math.cos(angle) * 0.25, -2.1, Math.sin(angle) * 0.25)
            );
            
            const stem = new THREE.Mesh(
                new THREE.TubeGeometry(curve, 12, 0.055, 8, false),
                new THREE.MeshPhongMaterial({ color: 0x1e3a1e, shininess: 2 })
            );
            stem.castShadow = true;
            stemGroup.add(stem);
        }
        bouquet.add(stemGroup);

        // Paper wrapper + ribbon
        const wrapper = new THREE.Mesh(
            new THREE.ConeGeometry(1.35, 2.6, 64),
            new THREE.MeshPhongMaterial({ color: 0xfff0f0, shininess: 5 })
        );
        wrapper.rotation.x = Math.PI;
        wrapper.position.y = -1.1;
        bouquet.add(wrapper);

        const ribbon = new THREE.Mesh(
            new THREE.TorusGeometry(1.15, 0.12, 18, 120),
            new THREE.MeshPhongMaterial({ 
                color: 0xff1133, 
                emissive: 0xcc0022,
                shininess: 20 
            })
        );
        ribbon.rotation.x = Math.PI / 2;
        ribbon.position.y = -0.65;
        bouquet.add(ribbon);

        bouquet.position.y = 1.1;
        scene.add(bouquet);

        // Falling petals
        const petalParticles = [];
        const particleGeometry = new THREE.BufferGeometry();
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.18,
            color: 0xff5555,
            transparent: true,
            opacity: 0.85,
            depthTest: false
        });
        const points = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(points);

        class FallingPetal {
            constructor() {
                this.position = new THREE.Vector3(
                    (Math.random() - 0.5) * 16,
                    5 + Math.random() * 6,
                    (Math.random() - 0.5) * 12
                );
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.8,
                    -0.3 - Math.random() * 0.4,
                    (Math.random() - 0.5) * 0.6
                );
                this.life = 1.0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                this.angle = Math.random() * Math.PI * 2;
            }
            
            update(dt, wind) {
                this.velocity.y -= 0.004;
                this.velocity.x += wind * 0.015;
                this.position.addScaledVector(this.velocity, dt * 18);
                this.angle += this.rotationSpeed * dt * 12;
                this.life -= dt * 0.18;
            }
        }

        let time = 0;
        let mouseX = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
        });

        // Modal
        const modal = document.getElementById('modal');
        const msgBtn = document.getElementById('msgBtn');
        const closeBtn = document.getElementById('closeBtn');

        msgBtn.addEventListener('click', () => {
            modal.classList.add('show');
            gsap.fromTo('.msg-box', 
                { scale: 0.6, opacity: 0, y: 40 }, 
                { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(1.2)" }
            );
        });

        closeBtn.addEventListener('click', () => modal.classList.remove('show'));
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('show');
        });

        // Animation
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            time += dt;

            // Gentle bouquet sway
            bouquet.rotation.y = Math.sin(time * 0.4) * 0.08 + mouseX * 0.6;
            bouquet.position.y = 1.1 + Math.sin(time * 0.8) * 0.1;

            // Light movement
            keyLight.position.x = 5 + Math.sin(time * 0.6) * 3;

            // Update particles
            if (Math.random() < 0.45 && petalParticles.length < 220) {
                petalParticles.push(new FallingPetal());
            }

            for (let i = petalParticles.length - 1; i >= 0; i--) {
                const p = petalParticles[i];
                p.update(dt, mouseX * 0.6);
                if (p.life <= 0 || p.position.y < -3) {
                    petalParticles.splice(i, 1);
                }
            }

            const positions = new Float32Array(petalParticles.length * 3);
            petalParticles.forEach((p, i) => {
                positions[i*3] = p.position.x;
                positions[i*3+1] = p.position.y;
                positions[i*3+2] = p.position.z;
            });
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            renderer.render(scene, camera);
        }

        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
