<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #2d0202, #000); overflow: hidden; }
        #canvas { display: block; }
        .ui { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); text-align: center; color: white; font-family: 'Playfair Display', serif; }
        button { padding: 15px 30px; border: 1px solid #ff4d4d; background: transparent; color: white; cursor: pointer; border-radius: 30px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="ui">
        <button onclick="alert('Since we can\'t meet today, I\'d like to give you this gift. Because a girl like you deserves truly a lot! This note is for you miss. ~ Benson Fernandes')">Read Message</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Rich Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const light = new THREE.DirectionalLight(0xff6666, 1.5);
        light.position.set(5, 5, 5);
        scene.add(light);

        // Load professional Rose Model
        const loader = new GLTFLoader();
        // This model is a high-fidelity red rose
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Rose/glTF/Rose.gltf', (gltf) => {
            const bouquet = new THREE.Group();
            for(let i=0; i<5; i++) {
                const rose = gltf.scene.clone();
                rose.position.set(Math.cos(i)*0.8, 0, Math.sin(i)*0.8);
                bouquet.add(rose);
            }
            scene.add(bouquet);
        });

        camera.position.set(0, 0, 4);
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
