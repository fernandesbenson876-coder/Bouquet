<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100vh; background: #050203; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .btn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: transparent; border: 1px solid #ff4d6d; color: #ffccd5; cursor: pointer; pointer-events: auto; z-index: 100; border-radius: 30px; }
    </style>
</head>
<body>

<button class="btn" onclick="openModal()">View Note</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
    // Scene Setup
    const scene = new THREE.Scene();
    // Lowered camera 'y' slightly to center the bouquet
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 6); 
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Realistic Lighting for Red Roses
    scene.add(new THREE.AmbientLight(0x401010, 1.5));
    const spot = new THREE.SpotLight(0xffffff, 2);
    spot.position.set(0, 5, 5);
    scene.add(spot);

    // Rose Creation (Deep Red Velvet Material)
    function createRose() {
        const group = new THREE.Group();
        const mat = new THREE.MeshStandardMaterial({ 
            color: 0x880808, // Deep Rose Red
            roughness: 0.9,  // Velvet-like texture
            side: THREE.DoubleSide 
        });

        // Petal shape using a simple oval geometry
        for(let i=0; i<5; i++) {
            const petal = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), mat);
            petal.scale.set(1, 1.5, 0.2);
            petal.rotation.z = (i / 5) * Math.PI * 2;
            group.add(petal);
        }
        return group;
    }

    // Creating the Bouquet
    const bouquet = new THREE.Group();
    for(let i=0; i<7; i++) {
        const rose = createRose();
        rose.position.set((Math.random()-0.5)*1.5, Math.random()*0.5, (Math.random()-0.5)*1.5);
        bouquet.add(rose);
    }
    scene.add(bouquet);

    function animate() {
        requestAnimationFrame(animate);
        bouquet.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();

    function openModal() { alert("Since I can't be there, this bouquet is for you."); }
</script>
</body>
</html>
