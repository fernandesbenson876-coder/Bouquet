<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Digital Bouquet</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fdf2f8, #fbcfe8);
            font-family: 'Georgia', serif;
            overflow: hidden;
            color: #881337;
        }

        h1 { margin-bottom: 2rem; font-style: italic; }

        .bouquet-wrap {
            position: relative;
            padding: 40px;
            background: #fff;
            border-radius: 20px 20px 50px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
        }

        .flower {
            position: relative;
            width: 60px;
            height: 150px;
            transition: transform 0.4s ease;
        }

        .flower:hover {
            transform: translateY(-20px);
        }

        /* The Bloom (Petals) */
        .bloom {
            width: 50px;
            height: 50px;
            background: #e11d48;
            border-radius: 50%;
            position: relative;
            animation: pulse 3s infinite ease-in-out;
        }

        /* Pseudo-elements for petal detail */
        .bloom::after, .bloom::before {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background: #be185d;
            border-radius: 50%;
        }
        .bloom::before { top: 15px; left: -20px; }
        .bloom::after { top: 15px; left: 20px; }

        .stem {
            width: 6px;
            height: 100px;
            background: #15803d;
            margin-left: 22px;
            border-radius: 0 0 10px 10px;
        }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            font-size: 20px;
            opacity: 0;
            pointer-events: none;
        }

        .flower:hover .heart {
            animation: floatUp 2s ease-out forwards;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>For You</h1>

    <div class="bouquet-wrap">
        <div class="flower">
            <div class="bloom"><div class="heart">❤️</div></div>
            <div class="stem"></div>
        </div>
        <div class="flower">
            <div class="bloom"><div class="heart">💖</div></div>
            <div class="stem"></div>
        </div>
        <div class="flower">
            <div class="bloom"><div class="heart">💕</div></div>
            <div class="stem"></div>
        </div>
    </div>

    <p style="margin-top: 30px; font-size: 1.2rem;">Hover over the flowers...</p>

</body>
</html>
