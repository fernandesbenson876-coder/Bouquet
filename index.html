<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
            font-family: 'Georgia', serif;
        }

        /* SVG Bouquet styling */
        .bouquet {
            display: flex;
            gap: 20px;
            cursor: pointer;
            perspective: 1000px;
        }

        .flower-container {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 10px rgba(225, 29, 72, 0.3));
        }

        .flower-container:hover {
            transform: translateY(-40px) scale(1.1);
        }

        /* Styling the SVG */
        .rose-svg {
            width: 120px;
            height: 200px;
            fill: #e11d48;
            stroke: #881337;
            stroke-width: 1px;
        }

        .stem { fill: #166534; }

        /* The Note */
        #note {
            margin-top: 50px;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
            font-size: 1.5rem;
            color: #fb7185;
            letter-spacing: 1px;
            pointer-events: none;
        }
        .visible { opacity: 1 !important; }

        /* Falling Petals */
        .petal {
            position: absolute;
            background: #e11d48;
            width: 8px; height: 12px;
            border-radius: 0 100% 0 100%;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body onclick="trigger()">

    <div class="bouquet">
        <div class="flower-container">
            <svg class="rose-svg" viewBox="0 0 100 200">
                <rect x="48" y="100" width="4" height="100" class="stem" />
                <path d="M50 100 Q 80 50, 50 0 T 20 50 Q 20 100, 50 100 Z" />
            </svg>
        </div>
        <div class="flower-container">
            <svg class="rose-svg" viewBox="0 0 100 200">
                <rect x="48" y="100" width="4" height="100" class="stem" />
                <path d="M50 100 Q 80 50, 50 0 T 20 50 Q 20 100, 50 100 Z" />
            </svg>
        </div>
        <div class="flower-container">
            <svg class="rose-svg" viewBox="0 0 100 200">
                <rect x="48" y="100" width="4" height="100" class="stem" />
                <path d="M50 100 Q 80 50, 50 0 T 20 50 Q 20 100, 50 100 Z" />
            </svg>
        </div>
    </div>

    <div id="note">Since I can't be there to hand you a bouquet, please accept this.</div>

    <script>
        function trigger() {
            document.getElementById('note').classList.add('visible');
            for(let i = 0; i < 30; i++) {
                setTimeout(createPetal, i * 150);
            }
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
    </script>
</body>
</html>
