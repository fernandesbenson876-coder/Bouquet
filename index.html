<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Base Styling */
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f0205; /* Deep romantic dark background */
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* The Main Presentation Card */
        .gift-card {
            background: #1a0409;
            border: 1px solid #3a0a14;
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(200, 0, 40, 0.15);
        }

        /* Real Wrapped Bouquet Image */
        .bouquet-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
            /* This ensures the image looks proportionate */
            object-fit: cover; 
            max-height: 350px;
        }

        /* Button Styling */
        .btn {
            background: #d90429;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(217, 4, 41, 0.4);
        }

        .btn:hover {
            background: #ef233c;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(217, 4, 41, 0.6);
        }

        /* Note Content Styling (Hidden by Default) */
        #note-content {
            display: none; /* Hidden until clicked */
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gift-card h1 {
            color: #ef233c;
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .gift-card p {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #edf2f4;
            margin-bottom: 15px;
        }

        /* Hand-written signature style */
        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #d90429;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="gift-card">
        <img src="https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?auto=format&fit=crop&q=80&w=800" alt="A Beautiful Wrapped Bouquet of Red Roses" class="bouquet-img">
        
        <div id="intro-section">
            <h1>A Special Gift</h1>
            <button class="btn" onclick="openNote()">Tap to Open Note</button>
        </div>

        <div id="note-content">
            <p>Since we can't meet today, I'd like to give you this gift.</p>
            <p>Because a girl like you deserves truly a lot!</p>
            <p>This note is for you miss.</p>
            <div class="signature">~ Benson Fernandes</div>
        </div>
    </div>

    <script>
        function openNote() {
            // Hide the intro section (the button and title)
            document.getElementById('intro-section').style.display = 'none';
            // Show the note content
            document.getElementById('note-content').style.display = 'block';
        }
    </script>
</body>
</html>
