<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Bouquet for You</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #ffe4e6, #fbcfe8);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #9f1239;
            margin-bottom: 50px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
            animation: fadeIn 2s ease-in;
        }

        .bouquet {
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        .flower {
            position: relative;
            width: 80px;
            height: 150px;
            transition: transform 0.5s ease;
            cursor: pointer;
        }

        .flower:hover {
            transform: scale(1.2) translateY(-20px);
        }

        .stem {
            width: 4px;
            height: 100px;
            background-color: #4ade80;
            position: absolute;
            bottom: 0;
            left: 38px;
            border-radius: 2px;
        }

        .bloom {
            width: 60px;
            height: 60px;
            background-color: #f472b6;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 10px;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.6);
            animation: sway 3s infinite ease-in-out;
        }

        /* Flower Variations */
        .flower:nth-child(2) .bloom { background-color: #fb7185; }
        .flower:nth-child(3) .bloom { background-color: #e11d48; }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>For You</h1>

    <div class="bouquet">
        <div class="flower">
            <div class="stem"></div>
            <div class="bloom"></div>
        </div>
        <div class="flower">
            <div class="stem"></div>
            <div class="bloom"></div>
        </div>
        <div class="flower">
            <div class="stem"></div>
            <div class="bloom"></div>
        </div>
    </div>

</body>
</html>
