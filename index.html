<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0f0205; 
            color: #ffffff;
            font-family: 'Playfair Display', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .gift-card {
            background: #1a0409;
            border: 1px solid #3a0a14;
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(200, 0, 40, 0.15);
            /* Set a minimum height so the card doesn't jump around while typing */
            min-height: 550px; 
            display: flex;
            flex-direction: column;
        }

        .bouquet-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
            object-fit: cover; 
            max-height: 300px;
        }

        #intro-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn {
            background: #d90429;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(217, 4, 41, 0.4);
            margin-top: 10px;
        }

        .btn:hover {
            background: #ef233c;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 20px rgba(217, 4, 41, 0.6);
        }

        .gift-card h1 {
            color: #ef233c;
            font-size: 2.2rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Note Content Styling */
        #note-content {
            display: none; 
            text-align: center;
            flex-grow: 1;
            display: none; /* Handled by JS */
            flex-direction: column;
            justify-content: center;
        }

        #note-content p {
            font-size: 1.2rem;
            line-height: 1.7;
            color: #edf2f4;
            margin-bottom: 15px;
            min-height: 1.7rem; /* Keeps spacing even before text appears */
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #d90429;
            margin-top: 25px;
            opacity: 0; /* Hidden until the very end */
            transition: opacity 1s ease;
        }
        
        /* Cursor blink effect for the typewriter */
        .cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: #ef233c;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="gift-card">
        <img src="https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?auto=format&fit=crop&q=80&w=800" alt="A Beautiful Wrapped Bouquet of Red Roses" class="bouquet-img">
        
        <div id="intro-section">
            <h1>A Special Gift</h1>
            <button class="btn" onclick="startTypewriter()">Tap to Open Note</button>
        </div>

        <div id="note-content">
            <p id="line1"></p>
            <p id="line2"></p>
            <p id="line3"></p>
            <div class="signature" id="sig">~ Benson Fernandes</div>
        </div>
    </div>

    <script>
        // The exact lines you want to type out
        const textLines = [
            "Since we can't meet today, I'd like to give you this gift.",
            "Because a girl like you deserves truly a lot!",
            "This note is for you miss."
        ];

        let currentLine = 0;
        let currentChar = 0;
        const typingSpeed = 50; // Milliseconds per character

        function startTypewriter() {
            // Hide intro, show the note container (but text is empty)
            document.getElementById('intro-section').style.display = 'none';
            const noteContainer = document.getElementById('note-content');
            noteContainer.style.display = 'flex';
            
            // Start typing the first line
            typeWriter();
        }

        function typeWriter() {
            if (currentLine < textLines.length) {
                const element = document.getElementById('line' + (currentLine + 1));
                
                // Add the cursor class to the current line
                element.classList.add('cursor');

                if (currentChar < textLines[currentLine].length) {
                    element.innerHTML += textLines[currentLine].charAt(currentChar);
                    currentChar++;
                    setTimeout(typeWriter, typingSpeed);
                } else {
                    // Finished this line, remove cursor and move to the next
                    element.classList.remove('cursor');
                    currentLine++;
                    currentChar = 0;
                    setTimeout(typeWriter, 500); // Pause before next line
                }
            } else {
                // All lines are done, reveal the signature smoothly
                document.getElementById('sig').style.opacity = '1';
            }
        }
    </script>
</body>
</html>
