<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0f0508 0%, #2a0a14 50%, #0f0508 100%);
            overflow: hidden;
            font-family: system-ui, sans-serif;
        }
        #canvas { display: block; width: 100%; height: 100%; }
        
        .header {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdddd;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 6px 40px rgba(180, 30, 30, 0.9);
            z-index: 100;
            pointer-events: none;
        }
        
        .btn {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 58px;
            background: rgba(180, 20, 40, 0.2);
            border: 2px solid #ff7777;
            color: #ffdddd;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            transition: all 0.4s;
            font-weight: 500;
            z-index: 100;
        }
        .btn:hover {
            background: rgba(200, 30, 50, 0.4);
            box-shadow: 0 0 35px rgba(255, 90, 90, 0.8);
            transform: translateX(-50%) scale(1.06);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(10, 5, 8, 0.95);
            backdrop-filter: blur(18px);
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex !important; }
        
        .msg-box {
            background: linear-gradient(145deg, #3a0f1f, #1a0812);
            padding: 75px 85px;
            border: 3px solid #cc4455;
            border-radius: 38px;
            max-width: 780px;
            text-align: center;
            box-shadow: 0 35px 130px rgba(200, 40, 60, 0.65);
        }
        .msg-box h2 { color: #ffbbbb; font-size: 44px; margin-bottom: 45px; letter-spacing: 2px; }
        .msg-box p { color: #ffeeee; font-size: 23px; line-height: 1.75; margin-bottom: 30px; }
        .msg-box .sig { color: #ff8888; font-size: 23px; margin-top: 55px; font-style: italic; }
        
        .close-btn {
            margin-top: 45px;
            padding: 15px 52px;
            background: rgba(180, 20, 40, 0.25);
            border: 2px solid #ff7777;
            color: #ffdddd;
            font-size: 17px;
            border-radius: 50px;
            cursor: pointer;
        }
        .close-btn:hover { background: #cc3344; transform: scale(1.05); }
        
        .hint {
            position: absolute;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 200, 0.55);
            font-size: 14px;
            z-index: 100;
            animation: pulse 2.8s infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.85; } }
    </style>
</head>
<body>
    <div class="header">✦ For You 🌹 ✦</div>
    <button class="btn" id="msgBtn">💌 Read My Message</button>

    <div id="modal" class="modal">
        <div class="msg-box">
            <h2>A Special Gift</h2>
            <p>Since we can't meet today, I'd like to give you this gift.</p>
            <p>Because a girl like you deserves truly a lot!</p>
            <p>This note is for you miss</p>
            <div class="sig">~ Benson Fernandes</div>
            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

    <div class="hint">Move mouse to admire • Click message</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        camera.position.set(0.2, 2.8, 7.8);
        camera.lookAt(0, 1.4, 0);

        // Warm natural lighting for realism
        scene.add(new THREE.AmbientLight(0xffeedd, 0.75));

        const keyLight = new THREE.PointLight(0xff7744, 4.8, 120);
        keyLight.position.set(6, 9, 11);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        scene.add(keyLight);

        scene.add(new THREE.PointLight(0xffaacc, 2.4, 90)).position.set(-5.5, 4.5, 7);
        scene.add(new THREE.PointLight(0xcc3366, 2.1, 70)).position.set(1, 6, -9);

        function createRealisticRose(baseColor) {
            const rose = new THREE.Group();
            
            function createPetal(color, size = 1, curl = 1) {
                const curvePoints = [];
                const segments = 32;
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const width = Math.sin(t * Math.PI) * 0.95;
                    const x = width * (0.6 + Math.sin(t * Math.PI * 3) * 0.08);
                    const y = t * 1.25;
                    const z = Math.sin(t * Math.PI * 1.8) * 0.09 * curl;
                    curvePoints.push(new THREE.Vector3(x, y, z));
                }
                
                const curve = new THREE.CatmullRomCurve3(curvePoints);
                const shapePoints = curve.getPoints(36);
                
                const shape = new THREE.Shape();
                shape.moveTo(shapePoints[0].x, shapePoints[0].y);
                shapePoints.forEach(p => shape.lineTo(p.x, p.y));
                
                for (let i = shapePoints.length - 1; i >= 0; i--) {
                    shape.lineTo(-shapePoints[i].x * 0.92, shapePoints[i].y);
                }
                shape.closePath();

                const geometry = new THREE.ShapeGeometry(shape);
                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    roughness: 0.65,
                    metalness: 0.05,
                    emissive: 0x330011,
                    emissiveIntensity: 0.15,
                    side: THREE.DoubleSide,
                    flatShading: false
                });

                const petal = new THREE.Mesh(geometry, material);
                petal.castShadow = true;
                petal.receiveShadow = true;
                return petal;
            }

            const layerConfigs = [
                { count: 38, radius: 0.78, height: 0.38, baseRotZ: -0.42, scale: 1.15, colorOffset: 0x110000 },
                { count: 32, radius: 0.58, height: 0.26, baseRotZ: -0.55, scale: 1.0, colorOffset: 0x000000 },
                { count: 24, radius: 0.39, height: 0.14, baseRotZ: -0.72, scale: 0.86, colorOffset: 0x220000 },
                { count: 14, radius: 0.19, height: 0.06, baseRotZ: -0.9, scale: 0.68, colorOffset: 0x440000 }
            ];

            layerConfigs.forEach((cfg, layerIndex) => {
                for (let i = 0; i < cfg.count; i++) {
                    const angle = (i / cfg.count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                    const petalColor = new THREE.Color(baseColor).offsetHSL(0, 0, -0.05 * layerIndex);
                    
                    const petal = createPetal(petalColor.getHex(), cfg.scale, 0.9 + Math.random() * 0.4);
                    
                    petal.position.set(
                        Math.cos(angle) * cfg.radius * (0.9 + Math.random() * 0.2),
                        cfg.height + Math.random() * 0.18 - layerIndex * 0.03,
                        Math.sin(angle) * cfg.radius * 0.85
                    );
                    
                    petal.rotation.set(
                        0.25 + Math.random() * 0.35,
                        angle + (Math.random() - 0.5) * 0.3,
                        cfg.baseRotZ + (Math.random() - 0.5) * 0.55
                    );
                    
                    rose.add(petal);
                }
            });

            const center = new THREE.Mesh(
                new THREE.SphereGeometry(0.19, 42, 42),
                new THREE.MeshStandardMaterial({
                    color: 0xffee99,
                    roughness: 0.4,
                    emissive: 0xff5500,
                    emissiveIntensity: 0.75
                })
            );
            center.position.y = 0.78;
            rose.add(center);

            return rose;
        }

        const bouquet = new THREE.Group();
        const roseColors = [0x9c1c2e, 0xb81e36, 0xd42a45, 0xe83b4f];

        for (let i = 0; i < 8; i++) {
            const color = roseColors[i % roseColors.length];
            const rose = createRealisticRose(color);
            
            const offset = 1.1;
            rose.position.set(
                (Math.random() - 0.5) * offset,
                0.1 + Math.random() * 0.55,
                (Math.random() - 0.5) * offset * 0.8
            );
            
            rose.rotation.set(
                (Math.random() - 0.5) * 0.35,
                Math.random() * Math.PI * 2,
                (Math.random() - 0.5) * 0.45
            );
            
            bouquet.add(rose);
        }

        const stemGroup = new THREE.Group();
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2 * 0.85;
            const curve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(Math.cos(angle) * 0.22, 0.45, Math.sin(angle) * 0.2),
                new THREE.Vector3(Math.cos(angle) * 0.05, -0.4, Math.sin(angle) * 0.12),
                new THREE.Vector3(Math.cos(angle) * 0.28, -2.35, Math.sin(angle) * 0.3)
            );
            
            const stemGeo = new THREE.TubeGeometry(curve, 18, 0.052, 8, false);
            const stem = new THREE.Mesh(stemGeo, new THREE.MeshStandardMaterial({
                color: 0x1f3a22,
                roughness: 0.9
            }));
            stem.castShadow = true;
            stemGroup.add(stem);
        }
        bouquet.add(stemGroup);

        const wrapper = new THREE.Mesh(
            new THREE.ConeGeometry(1.45, 2.8, 52),
            new THREE.MeshStandardMaterial({ color: 0xf8e8e0, roughness: 0.75 })
        );
        wrapper.rotation.x = Math.PI;
        wrapper.position.y = -1.25;
        bouquet.add(wrapper);

        const ribbon = new THREE.Mesh(
            new THREE.TorusGeometry(1.22, 0.11, 22, 110),
            new THREE.MeshStandardMaterial({ color: 0xbb1122, roughness: 0.35, metalness: 0.1 })
        );
        ribbon.rotation.x = Math.PI / 2.1;
        ribbon.position.y = -0.72;
        bouquet.add(ribbon);

        bouquet.position.y = 1.05;
        scene.add(bouquet);

        // Falling petals
        const petals = [];
        let particleGeo = new THREE.BufferGeometry();
        const particleMat = new THREE.PointsMaterial({
            size: 0.16,
            color: 0xff7777,
            transparent: true,
            opacity: 0.8,
            depthTest: false
        });
        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        class RealisticPetal {
            constructor() {
                this.pos = new THREE.Vector3(
                    (Math.random() - 0.5) * 15,
                    6.5 + Math.random() * 5,
                    (Math.random() - 0.5) * 13
                );
                this.vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.65,
                    -0.25 - Math.random() * 0.35,
                    (Math.random() - 0.5) * 0.55
                );
                this.life = 1;
                this.spin = Math.random() * Math.PI * 2;
                this.spinSpeed = (Math.random() - 0.5) * 0.18;
            }
            update(dt, wind) {
                this.vel.y -= 0.0035;
                this.vel.x += wind * 0.018;
                this.pos.addScaledVector(this.vel, dt * 22);
                this.spin += this.spinSpeed * dt * 18;
                this.life -= dt * 0.22;
            }
        }

        let mouseInfluence = 0;
        document.addEventListener('mousemove', (e) => {
            mouseInfluence = (e.clientX / window.innerWidth - 0.5) * 2.2;
        });

        // Modal logic
        const modal = document.getElementById('modal');
        const msgBtn = document.getElementById('msgBtn');
        const closeBtn = document.getElementById('closeBtn');
        let modalOpen = false;

        msgBtn.addEventListener('click', () => {
            modalOpen = true;
            modal.classList.add('show');
        });
        closeBtn.addEventListener('click', () => { modalOpen = false; modal.classList.remove('show'); });
        modal.addEventListener('click', (e) => { if (e.target === modal) { modalOpen = false; modal.classList.remove('show'); } });

        // Animation
        const clock = new THREE.Clock();
        let t = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            t += dt;

            if (!modalOpen) {
                bouquet.rotation.y = Math.sin(t * 0.35) * 0.09 + mouseInfluence * 0.45;
            }
            bouquet.position.y = 1.05 + Math.sin(t * 0.6) * 0.08;

            keyLight.position.x = 6 + Math.sin(t * 0.45) * 2.5;

            if (Math.random() < 0.6 && petals.length < 260) petals.push(new RealisticPetal());

            for (let i = petals.length - 1; i >= 0; i--) {
                petals[i].update(dt, mouseInfluence * 0.6);
                if (petals[i].life <= 0 || petals[i].pos.y < -4) petals.splice(i, 1);
            }

            const posArray = new Float32Array(petals.length * 3);
            petals.forEach((p, i) => {
                posArray[i*3] = p.pos.x;
                posArray[i*3+1] = p.pos.y;
                posArray[i*3+2] = p.pos.z;
            });
            particleGeo.dispose();
            particleGeo = new THREE.BufferGeometry();
            particleGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particleSystem.geometry = particleGeo;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
