<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #1a0000 100%);
            overflow: hidden;
        }
        #canvas { display: block; width: 100%; height: 100%; }
        .header {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff9999;
            font-size: 40px;
            font-weight: 300;
            letter-spacing: 4px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.9);
            z-index: 100;
        }
        .btn {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 50px;
            background: rgba(220, 20, 60, 0.2);
            border: 2px solid #ff4444;
            color: #ff9999;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.4s;
            font-weight: 600;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .btn:hover {
            background: rgba(220, 20, 60, 0.4);
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.8);
            transform: translateX(-50%) scale(1.1);
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex !important; }
        .msg-box {
            background: linear-gradient(135deg, rgba(50, 0, 0, 0.98) 0%, rgba(20, 0, 0, 0.98) 100%);
            padding: 80px 70px;
            border: 2px solid #dc143c;
            border-radius: 35px;
            width: 90%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 30px 120px rgba(220, 20, 60, 0.6);
            backdrop-filter: blur(30px);
        }
        .msg-box h2 {
            color: #ff9999;
            margin-bottom: 60px;
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 3px;
        }
        .msg-box p {
            color: #ffffff;
            font-size: 24px;
            line-height: 2.2;
            margin-bottom: 40px;
            font-weight: 300;
        }
        .msg-box .sig {
            color: #ff6666;
            font-size: 22px;
            margin-top: 70px;
            font-style: italic;
            font-weight: 500;
            letter-spacing: 2px;
        }
        .close-btn {
            background: rgba(220, 20, 60, 0.2);
            border: 2px solid #ff4444;
            color: #ff9999;
            padding: 14px 45px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 50px;
            margin-top: 60px;
            transition: all 0.4s;
            font-weight: 600;
        }
        .close-btn:hover {
            background: rgba(220, 20, 60, 0.4);
            box-shadow: 0 0 25px rgba(220, 20, 60, 0.7);
            transform: scale(1.1);
        }
        .hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 100, 100, 0.5);
            font-size: 13px;
            z-index: 100;
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>
    <div class="header">✦ For You ✦</div>
    <button class="btn" id="msgBtn">💌 Read Message</button>

    <div id="modal" class="modal">
        <div class="msg-box">
            <h2>A Special Gift</h2>
            <p>Since we can't meet today, I'd like to give you this gift.</p>
            <p>Because a girl like you deserves truly a lot!</p>
            <div class="sig">~ Benson Fernandes</div>
            <button class="close-btn" id="closeBtn">Close</button>
        </div>
    </div>

    <div class="hint">Move around • Click message</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.6;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.body.appendChild(renderer.domElement);

        camera.position.set(0, 2.2, 7.5);
        camera.lookAt(0, 1.8, 0);

        // LIGHTS - warmer for red roses
        const ambient = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambient);

        const key = new THREE.PointLight(0xff5555, 3.2, 250);
        key.position.set(6, 7, 9);
        key.castShadow = true;
        key.shadow.mapSize.width = 2048;
        key.shadow.mapSize.height = 2048;
        key.shadow.bias = -0.0005;
        scene.add(key);

        const fill = new THREE.PointLight(0xffaa88, 1.4, 180);
        fill.position.set(-7, 4, 5);
        scene.add(fill);

        const rim = new THREE.PointLight(0xdc143c, 1.3, 150);
        rim.position.set(0, 6, -10);
        scene.add(rim);

        // REALISTIC ROSE WITH LATHE GEOMETRY
        function createRealisticRose(color, glowColor) {
            const rose = new THREE.Group();

            // Function to create a single petal using a custom shape
            function createPetal(petalColor) {
                const curve = new THREE.CatmullRomCurve3([
                    new THREE.Vector3(0, 0, 0),
                    new THREE.Vector3(0.08, 0.15, 0.02),
                    new THREE.Vector3(0.12, 0.4, 0.05),
                    new THREE.Vector3(0.1, 0.65, 0.08),
                    new THREE.Vector3(0.05, 0.85, 0.06),
                    new THREE.Vector3(0, 1, 0.02)
                ]);

                const points = curve.getPoints(20);
                const shape = new THREE.Shape();
                shape.moveTo(points[0].x, points[0].y);
                points.forEach(p => shape.lineTo(p.x, p.y));
                points.reverse();
                points.forEach(p => shape.lineTo(-p.x, p.y));

                const geom = new THREE.ShapeGeometry(shape);
                const mat = new THREE.MeshStandardMaterial({
                    color: petalColor,
                    roughness: 0.28,
                    metalness: 0.05,
                    emissive: glowColor,
                    emissiveIntensity: 0.35,
                    side: THREE.DoubleSide,
                    flatShading: false
                });

                return new THREE.Mesh(geom, mat);
            }

            // OUTER LAYER - 32 petals spiraling
            for (let i = 0; i < 32; i++) {
                const angle = (i / 32) * Math.PI * 2 + Math.random() * 0.3;
                const petal = createPetal(color);
                
                const radius = 0.65;
                const heightOffset = 0.4;
                petal.position.set(
                    Math.cos(angle) * radius,
                    heightOffset + Math.random() * 0.15,
                    Math.sin(angle) * radius
                );
                
                petal.rotation.y = angle;
                petal.rotation.z = -0.4 + Math.random() * 0.3;
                petal.rotation.x = 0.2 + Math.random() * 0.2;
                petal.scale.set(1.1, 1, 1);
                
                petal.castShadow = true;
                petal.receiveShadow = true;
                rose.add(petal);
            }

            // MIDDLE LAYER - 24 petals
            for (let i = 0; i < 24; i++) {
                const angle = (i / 24) * Math.PI * 2 + 0.15 + Math.random() * 0.25;
                const petal = createPetal(color);
                
                const radius = 0.45;
                const heightOffset = 0.25;
                petal.position.set(
                    Math.cos(angle) * radius,
                    heightOffset + Math.random() * 0.12,
                    Math.sin(angle) * radius
                );
                
                petal.rotation.y = angle;
                petal.rotation.z = -0.5 + Math.random() * 0.35;
                petal.rotation.x = 0.3 + Math.random() * 0.25;
                petal.scale.set(0.95, 0.95, 1);
                
                petal.castShadow = true;
                petal.receiveShadow = true;
                rose.add(petal);
            }

            // INNER LAYER - 16 petals (tight center)
            for (let i = 0; i < 16; i++) {
                const angle = (i / 16) * Math.PI * 2 + 0.1 + Math.random() * 0.2;
                const petal = createPetal(color);
                
                const radius = 0.25;
                const heightOffset = 0.1;
                petal.position.set(
                    Math.cos(angle) * radius,
                    heightOffset + Math.random() * 0.1,
                    Math.sin(angle) * radius
                );
                
                petal.rotation.y = angle;
                petal.rotation.z = -0.65 + Math.random() * 0.4;
                petal.rotation.x = 0.4 + Math.random() * 0.3;
                petal.scale.set(0.8, 0.85, 1);
                
                petal.castShadow = true;
                petal.receiveShadow = true;
                rose.add(petal);
            }

            // CENTER BUD - richer golden/reddish
            const center = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 32, 32),
                new THREE.MeshStandardMaterial({
                    color: 0xffaa44,
                    roughness: 0.15,
                    metalness: 0.4,
                    emissive: 0xff6600,
                    emissiveIntensity: 0.7
                })
            );
            center.position.y = 0.55;
            center.castShadow = true;
            center.receiveShadow = true;
            rose.add(center);

            return rose;
        }

        // BUILD BOUQUET
        const bouquet = new THREE.Group();

        // 8 REAL RED ROSES - rich crimson & deep reds
        const roseConfigs = [
            { x: 0, y: 0, z: 0, color: 0xdc143c, glow: 0xff3333 },
            { x: -0.5, y: 0.2, z: -0.4, color: 0xb22222, glow: 0xff4444 },
            { x: 0.5, y: 0.2, z: -0.4, color: 0xe0115f, glow: 0xff2255 },
            { x: -0.6, y: 0.1, z: 0.35, color: 0xff1e1e, glow: 0xff5555 },
            { x: 0.6, y: 0.1, z: 0.35, color: 0xa52a2a, glow: 0xff6666 },
            { x: -0.3, y: 0.25, z: -0.15, color: 0xdc143c, glow: 0xff4444 },
            { x: 0.3, y: 0.25, z: -0.15, color: 0xb22222, glow: 0xff5555 },
            { x: 0, y: 0.35, z: 0.5, color: 0xe0115f, glow: 0xff3366 }
        ];

        roseConfigs.forEach(config => {
            const rose = createRealisticRose(config.color, config.glow);
            rose.position.set(config.x, config.y, config.z);
            rose.rotation.z = (Math.random() - 0.5) * 0.3;
            bouquet.add(rose);
        });

        // STEMS - bundled together
        const stemGroup = new THREE.Group();
        
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const stemCurve = new THREE.LineCurve3(
                new THREE.Vector3(Math.cos(angle) * 0.15, 0.3, Math.sin(angle) * 0.15),
                new THREE.Vector3(Math.cos(angle) * 0.18, -1.8, Math.sin(angle) * 0.18)
            );
            const stem = new THREE.Mesh(
                new THREE.TubeGeometry(stemCurve, 8, 0.08, 6),
                new THREE.MeshStandardMaterial({ color: 0x2d5016, roughness: 0.8 })
            );
            stem.castShadow = true;
            stem.receiveShadow = true;
            stemGroup.add(stem);
        }
        bouquet.add(stemGroup);

        // WHITE WRAPPER CONE
        const wrapper = new THREE.Mesh(
            new THREE.ConeGeometry(1, 2, 48),
            new THREE.MeshStandardMaterial({ 
                color: 0xf5f5f5, 
                roughness: 0.5, 
                metalness: 0.1,
                flatShading: false
            })
        );
        wrapper.position.y = -0.8;
        wrapper.castShadow = true;
        wrapper.receiveShadow = true;
        bouquet.add(wrapper);

        // RED RIBBON BOW
        const ribbon = new THREE.Mesh(
            new THREE.TorusGeometry(1.0, 0.1, 16, 100),
            new THREE.MeshStandardMaterial({
                color: 0xdc143c,
                roughness: 0.25,
                metalness: 0.25,
                emissive: 0xff1e1e,
                emissiveIntensity: 0.45
            })
        );
        ribbon.position.y = -0.3;
        ribbon.rotation.x = Math.PI / 2.2;
        ribbon.castShadow = true;
        ribbon.receiveShadow = true;
        bouquet.add(ribbon);

        bouquet.position.y = 0.95;
        scene.add(bouquet);

        // PARTICLES - falling red rose petals
        const particles = [];
        let particleGeom = new THREE.BufferGeometry();
        const particleMat = new THREE.PointsMaterial({
            size: 0.15,
            sizeAttenuation: true,
            transparent: true,
            color: 0xff5555,
            opacity: 0.75,
            depthWrite: false
        });
        let particlePoints = new THREE.Points(particleGeom, particleMat);
        scene.add(particlePoints);

        class Particle {
            constructor() {
                this.pos = new THREE.Vector3(
                    (Math.random() - 0.5) * 14,
                    6 + Math.random() * 3,
                    (Math.random() - 0.5) * 14
                );
                this.vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.6,
                    -Math.random() * 0.3 - 0.1,
                    (Math.random() - 0.5) * 0.6
                );
                this.life = 1;
                this.maxLife = Math.random() * 18 + 15;
                this.spin = Math.random() * Math.PI * 2;
                this.spinVel = (Math.random() - 0.5) * 0.15;
            }

            update(dt, wind) {
                this.vel.y -= 0.003;
                this.vel.x += wind.x * 0.02;
                this.vel.z += wind.z * 0.02;
                this.pos.add(this.vel);
                this.spin += this.spinVel;
                this.life -= dt / this.maxLife;
                if (this.pos.y < -5) this.life = 0;
            }
        }

        let emitCounter = 0;
        function updateParticles(dt, wind) {
            emitCounter += dt;
            if (emitCounter > 0.15 && particles.length < 180) {
                particles.push(new Particle());
                emitCounter = 0;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(dt, wind);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            const positions = [];
            particles.forEach(p => positions.push(p.pos.x, p.pos.y, p.pos.z));
            particleGeom.dispose();
            particleGeom = new THREE.BufferGeometry();
            if (positions.length > 0) {
                particleGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            }
            particlePoints.geometry = particleGeom;
        }

        // INTERACTION
        let mouseX = 0, mouseY = 0;
        let windX = 0, windY = 0;
        let targetRotY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            windX = mouseX * 0.7;
            windY = mouseY * 0.7;
            targetRotY = mouseX * 0.7;
        });

        // MODAL
        const modal = document.getElementById('modal');
        const msgBtn = document.getElementById('msgBtn');
        const closeBtn = document.getElementById('closeBtn');
        let isModalOpen = false;

        msgBtn.addEventListener('click', () => {
            isModalOpen = true;
            modal.classList.add('show');
            gsap.from('.msg-box', { scale: 0.8, opacity: 0, duration: 0.5, ease: 'back.out' });
        });

        closeBtn.addEventListener('click', () => {
            isModalOpen = false;
            modal.classList.remove('show');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                isModalOpen = false;
                modal.classList.remove('show');
            }
        });

        // ANIMATION LOOP
        const clock = new THREE.Clock();
        let elapsed = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            elapsed += dt;

            updateParticles(dt, { x: windX, y: windY });

            if (!isModalOpen) {
                bouquet.rotation.y += (targetRotY - bouquet.rotation.y) * 0.03;
            }

            bouquet.position.y = 0.95 + Math.sin(elapsed * 0.7) * 0.14;

            key.position.x = 6 + Math.sin(elapsed * 0.4) * 2.2;
            key.position.z = 9 + Math.cos(elapsed * 0.3) * 2.2;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
