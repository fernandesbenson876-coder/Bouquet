<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #1a0033 100%);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
        }

        .container {
            position: relative;
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }

        .header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 220, 0.8);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.7);
        }

        .message-button {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: rgba(255, 105, 180, 0.3);
            border: 2px solid rgba(255, 180, 220, 0.8);
            color: rgba(255, 200, 220, 0.9);
            font-size: 16px;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            pointer-events: auto;
            font-weight: 500;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .message-button:hover {
            background: rgba(255, 105, 180, 0.5);
            border-color: rgba(255, 200, 220, 1);
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            transform: translateX(-50%) scale(1.05);
        }

        .message-button:active {
            transform: translateX(-50%) scale(0.98);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(45, 0, 82, 0.95) 0%, rgba(26, 0, 51, 0.95) 100%);
            margin: 10% auto;
            padding: 50px;
            border: 2px solid rgba(255, 105, 180, 0.5);
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 10px 60px rgba(255, 105, 180, 0.3);
            animation: slideIn 0.5s ease;
            backdrop-filter: blur(20px);
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: rgba(255, 200, 220, 0.95);
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .modal-content p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .modal-content .signature {
            color: rgba(255, 180, 220, 0.9);
            font-size: 16px;
            margin-top: 40px;
            font-style: italic;
            font-weight: 400;
        }

        .close {
            color: rgba(255, 200, 220, 0.8);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
            pointer-events: auto;
        }

        .close:hover {
            color: rgba(255, 200, 220, 1);
        }

        .hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 220, 0.4);
            font-size: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="header">✦ For You ✦</div>
    
    <button class="message-button" id="messageBtn">💌 Open Message</button>

    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>A Special Message</h2>
            <p>Since we can't meet today, I'd like to give you this as a gift like you deserves truly a lot!</p>
            <div class="signature">~ Benson Fernandes</div>
        </div>
    </div>

    <div class="hint">Rotate • Hover • Click Message</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ============================================
        // SCENE SETUP
        // ============================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        document.body.appendChild(renderer.domElement);

        camera.position.set(0, 1.5, 5.5);
        camera.lookAt(0, 1.2, 0);

        // ============================================
        // LIGHTING
        // ============================================
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const mainLight = new THREE.PointLight(0xffb3d9, 2.8, 150);
        mainLight.position.set(4, 5, 6);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x7fb3ff, 1.5, 120);
        fillLight.position.set(-5, 3, 3);
        scene.add(fillLight);

        const rimLight = new THREE.PointLight(0xda70d6, 1.2, 100);
        rimLight.position.set(0, 4, -6);
        scene.add(rimLight);

        // ============================================
        // ROSE FLOWER (REALISTIC 3D)
        // ============================================
        function createRose(color, colorLight) {
            const roseGroup = new THREE.Group();

            // Create multiple petal layers
            const petalLayers = [
                { count: 5, radius: 0.15, height: 0, scale: 0.4 },
                { count: 8, radius: 0.3, height: 0.1, scale: 0.6 },
                { count: 12, radius: 0.45, height: 0.25, scale: 0.75 },
                { count: 16, radius: 0.55, height: 0.4, scale: 0.85 },
                { count: 20, radius: 0.65, height: 0.55, scale: 0.9 }
            ];

            petalLayers.forEach(layer => {
                for (let i = 0; i < layer.count; i++) {
                    const angle = (i / layer.count) * Math.PI * 2 + Math.random() * 0.3;
                    
                    // Create petal shape
                    const petalGeom = new THREE.BufferGeometry();
                    const vertices = new Float32Array([
                        0, 0, 0,
                        -0.2, 0.3, 0.1,
                        0, 0.6, 0.2,
                        0.2, 0.3, 0.1,
                        0, 0.4, 0,
                    ]);
                    petalGeom.setAttribute('position', new THREE.BufferAttribute(vertices, 3));

                    const indices = [
                        0, 1, 2,
                        0, 2, 3,
                        0, 3, 4,
                        0, 4, 1,
                        1, 2, 3,
                        1, 3, 4,
                    ];
                    petalGeom.setIndex(indices);
                    petalGeom.computeVertexNormals();

                    const petalMat = new THREE.MeshStandardMaterial({
                        color: color,
                        roughness: 0.4,
                        metalness: 0.05,
                        emissive: colorLight,
                        emissiveIntensity: 0.2,
                        side: THREE.DoubleSide,
                    });

                    const petal = new THREE.Mesh(petalGeom, petalMat);
                    petal.position.set(
                        Math.cos(angle) * layer.radius,
                        layer.height,
                        Math.sin(angle) * layer.radius
                    );
                    petal.rotation.y = angle;
                    petal.rotation.z = (Math.random() - 0.5) * 0.6;
                    petal.rotation.x = Math.random() * 0.3;
                    petal.scale.set(layer.scale, layer.scale, layer.scale);
                    petal.castShadow = true;
                    petal.receiveShadow = true;

                    roseGroup.add(petal);
                }
            });

            // Rose center - golden sphere
            const centerGeom = new THREE.SphereGeometry(0.25, 32, 32);
            const centerMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                roughness: 0.2,
                metalness: 0.3,
                emissive: 0xffaa00,
                emissiveIntensity: 0.5,
            });
            const center = new THREE.Mesh(centerGeom, centerMat);
            center.position.y = 0.6;
            center.castShadow = true;
            center.receiveShadow = true;
            roseGroup.add(center);

            return roseGroup;
        }

        // ============================================
        // BOUQUET ASSEMBLY
        // ============================================
        const bouquetGroup = new THREE.Group();

        // Rose colors - vibrant pinks, reds, magentas
        const colors = [
            { primary: 0xff1493, light: 0xff69b4 },    // Deep pink
            { primary: 0xff0080, light: 0xff6bb3 },    // Hot pink
            { primary: 0xff0040, light: 0xff5599 },    // Red pink
            { primary: 0xd81b60, light: 0xf06292 },    // Vibrant pink
            { primary: 0xc2185b, light: 0xec407a },    // Rose pink
            { primary: 0xaa0080, light: 0xd946a6 },    // Magenta
            { primary: 0xff1744, light: 0xff5252 },    // Red
            { primary: 0xe91e63, light: 0xf48fb1 },    // Pink
        ];

        // Position roses in a tight, realistic bouquet formation
        const rosePositions = [
            // Center cluster
            { x: 0, y: 0, z: 0 },
            { x: 0.35, y: 0.1, z: -0.2 },
            { x: -0.35, y: 0.1, z: -0.2 },
            { x: 0.2, y: -0.1, z: 0.3 },
            { x: -0.2, y: -0.1, z: 0.3 },
            
            // Outer circle
            { x: 0.6, y: 0.15, z: 0 },
            { x: -0.6, y: 0.15, z: 0 },
            { x: 0, y: 0.2, z: 0.6 },
        ];

        rosePositions.forEach((pos, index) => {
            const colorSet = colors[index % colors.length];
            const rose = createRose(colorSet.primary, colorSet.light);
            rose.position.set(pos.x, pos.y, pos.z);
            rose.rotation.z = (Math.random() - 0.5) * 0.2;
            bouquetGroup.add(rose);
        });

        // Add stems and wrapper
        const stemCurve = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 0.5, 0),
            new THREE.Vector3(0, -0.5, 0),
            new THREE.Vector3(0, -1.5, 0),
        ]);
        const stemGeom = new THREE.TubeGeometry(stemCurve, 20, 0.25, 8);
        const stemMat = new THREE.MeshStandardMaterial({
            color: 0x2d5016,
            roughness: 0.7,
        });
        const stem = new THREE.Mesh(stemGeom, stemMat);
        stem.castShadow = true;
        stem.receiveShadow = true;
        bouquetGroup.add(stem);

        // Wrapper
        const wrapperGeom = new THREE.ConeGeometry(0.7, 1.5, 32);
        const wrapperMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.5,
            metalness: 0.1,
        });
        const wrapper = new THREE.Mesh(wrapperGeom, wrapperMat);
        wrapper.position.y = -0.8;
        wrapper.castShadow = true;
        wrapper.receiveShadow = true;
        bouquetGroup.add(wrapper);

        bouquetGroup.position.set(0, 0.8, 0);
        scene.add(bouquetGroup);

        // ============================================
        // PARTICLE SYSTEM - AMBIENT PETALS
        // ============================================
        class PetalParticle {
            constructor() {
                this.position = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    4 + Math.random() * 2,
                    (Math.random() - 0.5) * 8
                );
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    -Math.random() * 0.15 - 0.05,
                    (Math.random() - 0.5) * 0.3
                );
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationVel = (Math.random() - 0.5) * 0.1;
                this.life = 1;
                this.maxLife = Math.random() * 12 + 10;
            }

            update(deltaTime, wind) {
                this.velocity.y -= 0.002;
                this.velocity.x += wind.x * 0.01;
                this.velocity.z += wind.z * 0.01;

                this.position.add(this.velocity);
                this.rotation += this.rotationVel;

                this.life -= deltaTime / this.maxLife;
                if (this.life < 0) this.life = 0;
                if (this.position.y < -2) this.life = 0;
            }

            isAlive() {
                return this.life > 0;
            }
        }

        let particles = [];
        const maxParticles = 120;
        let emissionCounter = 0;

        function updateParticles(deltaTime, wind) {
            emissionCounter += deltaTime;
            if (emissionCounter > 0.08 && particles.length < maxParticles) {
                particles.push(new PetalParticle());
                emissionCounter = 0;
            }

            particles = particles.filter(p => {
                p.update(deltaTime, wind);
                return p.isAlive();
            });
        }

        // Render particles
        let particleGeom = new THREE.BufferGeometry();
        const particleMat = new THREE.PointsMaterial({
            size: 0.08,
            sizeAttenuation: true,
            transparent: true,
            depthWrite: false,
            color: 0xffb3d9,
            opacity: 0.5,
        });
        let particlePoints = new THREE.Points(particleGeom, particleMat);
        scene.add(particlePoints);

        function updateParticleGeom() {
            const positions = [];
            particles.forEach(p => {
                positions.push(p.position.x, p.position.y, p.position.z);
            });

            particleGeom.dispose();
            particleGeom = new THREE.BufferGeometry();
            if (positions.length > 0) {
                particleGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            }
            particlePoints.geometry = particleGeom;
        }

        // ============================================
        // INTERACTION
        // ============================================
        const mouse = new THREE.Vector2();
        const windVector = new THREE.Vector2(0, 0);
        let targetRotY = 0;

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            windVector.x = mouse.x * 0.5;
            windVector.y = mouse.y * 0.5;
            targetRotY = mouse.x * 0.5;
        });

        // ============================================
        // MODAL
        // ============================================
        const modal = document.getElementById('messageModal');
        const btn = document.getElementById('messageBtn');
        const closeBtn = document.querySelector('.close');

        btn.addEventListener('click', () => {
            modal.style.display = 'block';
            gsap.from('.modal-content', {
                opacity: 0,
                y: -30,
                duration: 0.5,
                ease: 'back.out'
            });
        });

        closeBtn.addEventListener('click', () => {
            gsap.to('.modal-content', {
                opacity: 0,
                y: -30,
                duration: 0.3,
                ease: 'back.in',
                onComplete: () => {
                    modal.style.display = 'none';
                }
            });
        });

        window.addEventListener('click', (e) => {
            if (e.target === modal) {
                gsap.to('.modal-content', {
                    opacity: 0,
                    y: -30,
                    duration: 0.3,
                    ease: 'back.in',
                    onComplete: () => {
                        modal.style.display = 'none';
                    }
                });
            }
        });

        // ============================================
        // ANIMATION LOOP
        // ============================================
        const clock = new THREE.Clock();
        let elapsed = 0;

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            elapsed += deltaTime;

            // Update particles
            updateParticles(deltaTime, windVector);
            updateParticleGeom();

            // Smooth rotation
            bouquetGroup.rotation.y += (targetRotY - bouquetGroup.rotation.y) * 0.02;

            // Gentle bobbing animation
            bouquetGroup.position.y = 0.8 + Math.sin(elapsed * 0.8) * 0.08;

            // Light animation
            mainLight.position.x = 4 + Math.sin(elapsed * 0.3) * 1.5;
            mainLight.position.z = 6 + Math.cos(elapsed * 0.25) * 1.5;

            renderer.render(scene, camera);
        }

        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
