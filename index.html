<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --rose-color: #e11d48;
            --rose-dark: #881337;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            color: white;
        }

        /* Falling Petals Background */
        .petals {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .petal {
            position: absolute;
            background: var(--rose-color);
            width: 10px; height: 10px;
            border-radius: 0 50% 50% 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            from { transform: translateY(-10vh) rotate(0deg); }
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* The Bouquet */
        .bouquet {
            display: flex;
            gap: 40px;
            z-index: 10;
            cursor: pointer;
        }

        .flower {
            position: relative;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .flower:hover { transform: scale(1.1); }

        .stem {
            width: 6px; height: 150px;
            background: linear-gradient(to bottom, #166534, #064e3b);
            border-radius: 3px;
        }

        .bloom {
            width: 60px; height: 60px;
            background: var(--rose-color);
            border-radius: 50%;
            position: absolute;
            top: -50px; left: -27px;
            box-shadow: 0 0 20px rgba(225, 29, 72, 0.5);
            transition: transform 0.5s;
        }

        .flower:hover .bloom { transform: scale(1.3); }

        /* Secret Message */
        #message {
            margin-top: 50px;
            font-size: 2rem;
            opacity: 0;
            transition: opacity 2s;
            text-align: center;
        }

        .revealed { opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="petals" id="petals"></div>

    <h1>Click the flowers to open your gift</h1>

    <div class="bouquet" onclick="reveal()">
        <div class="flower"><div class="stem"></div><div class="bloom"></div></div>
        <div class="flower"><div class="stem"></div><div class="bloom"></div></div>
        <div class="flower"><div class="stem"></div><div class="bloom"></div></div>
    </div>

    <div id="message">You make my world bloom. ❤️</div>

    <script>
        // Generate Falling Petals
        const container = document.getElementById('petals');
        for (let i = 0; i < 20; i++) {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
            petal.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(petal);
        }

        function reveal() {
            document.getElementById('message').classList.add('revealed');
        }
    </script>
</body>
</html>
