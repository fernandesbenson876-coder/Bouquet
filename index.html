<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You 🌹</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100vh;
            font-family: 'Playfair Display', serif;
            background: radial-gradient(circle at center, #1f050c 0%, #080104 100%);
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Sparkle Particles */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 77, 109, 0.35);
            border-radius: 50%;
            animation: float Upwards 9s infinite linear;
        }

        @keyframes floatUpwards {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Layout Container */
        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 550px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Premium Envelope Button */
        #open-btn {
            padding: 20px 50px;
            background: rgba(255, 77, 109, 0.1);
            border: 2px solid #ff4d6d;
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(255, 77, 109, 0.25);
            text-transform: uppercase;
        }

        #open-btn:hover {
            background: #ff4d6d;
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 15px 50px rgba(255, 77, 109, 0.5);
        }

        /* The Elegant Presentation Card */
        .gift-card {
            display: none; /* Controlled safely by JavaScript */
            background: rgba(18, 4, 8, 0.92);
            border: 1px solid rgba(255, 77, 109, 0.2);
            border-radius: 24px;
            padding: 35px 30px;
            text-align: center;
            color: #fdf2f8;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            width: 100%;
            opacity: 0;
            transform: scale(0.93) translateY(30px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Real, Wrapped Bouquet Visual Asset */
        .bouquet-image {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gift-card h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            font-weight: 400;
            color: #ffb3c6;
            letter-spacing: 1px;
        }

        .gift-card p {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 16px;
            color: #ffeef2;
            font-weight: 300;
        }

        .gift-card .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            color: #ff4d6d;
            margin-top: 35px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Seamless Mobile Adaptation */
        @media (max-width: 480px) {
            .gift-card { padding: 25px 20px; }
            .bouquet-image { max-height: 220px; margin-bottom: 20px; }
            .gift-card h1 { font-size: 1.75rem; }
            .gift-card p { font-size: 1.05rem; line-height: 1.6; }
            .gift-card .signature { font-size: 2.5rem; margin-top: 25px; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="wrapper">
        
        <button id="open-btn" onclick="revealGift()">Tap to Open</button>

        <div class="gift-card" id="note">
            <img class="bouquet-image" src="https://images.unsplash.com/photo-1587314168485-3236d6710814?w=800&auto=format&fit=crop&q=80" alt="Red Roses Bouquet">
            
            <h1>A Special Gift</h1>
            <p>Since we can't meet today, I'd like to give you this gift.</p>
            <p>Because a girl like you deserves truly a lot!</p>
            <p>This note is for you miss.</p>
            
            <div class="signature">~ Benson Fernandes</div>
        </div>

    </div>

    <script>
        // Generate beautiful background glow particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 2; 
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 5 + 5) + 's';
                particle.style.animationDelay = (Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        // Clean, error-proof display switcher
        function revealGift() {
            const btn = document.getElementById('open-btn');
            const note = document.getElementById('note');

            // 1. Remove the button from the layout structure entirely
            btn.style.display = 'none';

            // 2. Insert the card block into the DOM space immediately
            note.style.display = 'block';

            // 3. Smoothly animate the opacity and transition scales
            setTimeout(() => {
                note.style.opacity = '1';
                note.style.transform = 'scale(1) translateY(0)';
            }, 50);
        }

        // Run ambient design on load
        window.onload = createParticles;
    </script>
</body>
</html>
