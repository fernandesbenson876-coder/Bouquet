<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You 🌹</title>
    <style>
        /* Force everything to stay within bounds */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #0f0205; 
            color: #fff; 
            font-family: 'Playfair Display', serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            width: 100vw;
            overflow-x: hidden; /* Prevents horizontal scroll */
        }

        #night-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .gift-card {
            position: relative; 
            z-index: 10; 
            background: rgba(26, 4, 9, 0.95);
            border: 1px solid rgba(217, 4, 41, 0.3);
            border-radius: 20px; 
            padding: 20px; 
            width: 90%; 
            max-width: 400px; /* Ensures it doesn't get too big */
            text-align: center; 
            transition: all 0.5s ease;
            margin: 0 auto;
        }

        .gift-card.folded { transform: scale(0.85) translateY(-30px); opacity: 0.8; }

        /* The fix for the image spillover */
        .bouquet-img { 
            width: 100%; 
            height: auto; 
            border-radius: 12px; 
            display: block; 
            margin: 0 auto 15px auto;
        }

        .section { display: none; flex-direction: column; align-items: center; }
        
        button {
            background: #d90429; color: white; border: none; padding: 12px 25px; 
            border-radius: 25px; font-size: 0.9rem; cursor: pointer; margin: 5px;
        }

        #sky-note { 
            display: none; color: #fff; font-style: italic; font-size: 0.9rem; 
            margin-top: 15px; padding: 10px; border-top: 1px solid #d90429;
        }
    </style>
</head>
<body>

    <div id="night-sky"></div>

    <div class="gift-card" id="card">
        <img src="https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?auto=format&fit=crop&q=80&w=400" class="bouquet-img">
        
        <div class="section" id="intro-section" style="display:flex;">
            <button onclick="startExperience()">Tap to Open</button>
        </div>

        <div class="section" id="main-content">
            <p>Since we can't meet today, I wanted to share this with you.</p>
        </div>

        <div id="sky-note">Since we couldn't go stargazing yet, I brought the sky to you. ✨</div>

        <div id="action-menu" style="display:none; margin-top:10px;">
            <button onclick="toggleSky()">Sky</button>
            <button onclick="reset()">Reset</button>
        </div>
    </div>

    <script>
        let skyActive = false;
        function startExperience() {
            document.getElementById('intro-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('action-menu').style.display = 'block';
        }

        function toggleSky() {
            const card = document.getElementById('card'), note = document.getElementById('sky-note');
            if (!skyActive) {
                card.classList.add('folded');
                note.style.display = 'block';
                skyActive = true;
            }
        }

        function reset() {
            document.getElementById('card').classList.remove('folded');
            document.getElementById('sky-note').style.display = 'none';
            skyActive = false;
        }
    </script>
</body>
</html>
