<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Gift For You</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100vh;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            /* * This applies the image directly to the body so it CANNOT be hidden.
             * It includes a dark gradient overlay so your white text is easy to read.
             */
            background-color: #1a0505; /* Fallback color */
            background-image: 
                linear-gradient(to bottom, rgba(15, 5, 8, 0.3), rgba(15, 5, 8, 0.85)),
                url('https://images.unsplash.com/photo-1561181286-d3fee7d55364?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Ambient Particles */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 77, 109, 0.5);
            border-radius: 50%;
            animation: float 7s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* UI Container */
        .ui-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* The Open Button */
        #open-btn {
            padding: 18px 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: 1.2rem;
            font-family: 'Playfair Display', serif;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            text-transform: uppercase;
        }

        #open-btn:hover {
            background: rgba(255, 77, 109, 0.4);
            border-color: #ff4d6d;
            transform: scale(1.05);
        }

        /* The Frosted Glass Note */
        .glass-card {
            background: rgba(20, 5, 10, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            color: #fdf2f8;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            
            /* Hidden initially */
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: absolute;
        }

        .glass-card.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .glass-card h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 400;
            color: #ffb3c6;
        }

        .glass-card p {
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .glass-card .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            color: #ff4d6d;
            margin-top: 30px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        @media (max-width: 600px) {
            .glass-card { padding: 40px 20px; }
            .glass-card h1 { font-size: 2rem; }
            .glass-card p { font-size: 1.15rem; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="ui-container">
        
        <button id="open-btn" onclick="revealGift()">Tap to Open</button>

        <div class="glass-card" id="note">
            <h1>A Special Gift</h1>
            <p>Since we can't meet today, I'd like to give you this gift.</p>
            <p>Because a girl like you deserves truly a lot!</p>
            <p>This note is for you miss.</p>
            <div class="signature">~ Benson Fernandes</div>
        </div>

    </div>

    <script>
        // Create subtle floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 5 + 2; 
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 6 + 4) + 's';
                particle.style.animationDelay = (Math.random() * 4) + 's';
                container.appendChild(particle);
            }
        }

        // Handle the button click and note reveal
        function revealGift() {
            const btn = document.getElementById('open-btn');
            const note = document.getElementById('note');

            // Hide button smoothly
            btn.style.opacity = '0';
            btn.style.pointerEvents = 'none';

            // Show the glass note smoothly
            setTimeout(() => {
                note.classList.add('visible');
            }, 300);
        }

        //
